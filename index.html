<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f1a">
<title>Claude Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#0f0f1a;color:#e8e6f0;font-family:'Noto Sans TC',system-ui,sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
#app{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0}
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s}
.sidebar-overlay.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:#13132a;z-index:90;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;padding-top:max(12px,env(safe-area-inset-top))}
.sidebar.open{transform:translateX(0)}
.sidebar-header{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-header h3{font-size:16px;font-weight:700}
.sidebar-new{background:linear-gradient(135deg,#7c6fea,#a78bfa);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.sidebar-new:active{transform:scale(.96)}
.conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{padding:12px 14px;border-radius:12px;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s;position:relative}
.conv-item:active,.conv-item.active{background:rgba(124,111,234,.15)}
.conv-item.active{border:1px solid rgba(124,111,234,.25)}
.conv-item:not(.active){border:1px solid transparent}
.conv-title{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;margin-right:8px}
.conv-time{font-size:10px;opacity:.35;white-space:nowrap}
.conv-del{background:none;border:none;color:#e8e6f0;opacity:.3;cursor:pointer;padding:4px;display:flex;font-size:16px;border-radius:6px;flex-shrink:0;margin-left:4px}
.conv-del:active{opacity:.8;background:rgba(239,68,68,.15)}
.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg,rgba(30,28,50,.97),rgba(15,15,26,.97));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;z-index:10;padding-top:max(12px,env(safe-area-inset-top))}
.header-left{display:flex;align-items:center;gap:10px}
.menu-btn{background:rgba(255,255,255,.06);border:1px solid transparent;border-radius:10px;padding:8px 10px;cursor:pointer;color:#e8e6f0;display:flex;align-items:center}
.menu-btn:active{background:rgba(255,255,255,.12)}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7c6fea,#c084fc);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;box-shadow:0 2px 10px rgba(124,111,234,.25)}
.header-title{font-size:15px;font-weight:700;letter-spacing:-.02em}
.header-sub{font-size:11px;opacity:.4;margin-top:-1px}
.header-sub .online{color:#6ee7b7;margin-left:6px}
.header-btns{display:flex;gap:6px}
.icon-btn{background:rgba(255,255,255,.06);border:1px solid transparent;border-radius:10px;padding:8px 10px;cursor:pointer;color:#e8e6f0;display:flex;align-items:center}
.icon-btn:active{background:rgba(255,255,255,.12)}
.icon-btn.active{background:rgba(124,111,234,.25);border-color:rgba(124,111,234,.4)}
.chat-area{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch;min-height:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:.35;text-align:center;padding:40px 20px;gap:10px}
.msg-row{display:flex;animation:msgIn .25s ease;flex-direction:column}
.msg-row.user{align-items:flex-end}
.msg-row.assistant{align-items:flex-start}
.msg-row.no-anim{animation:none}
.bubble{max-width:85%;padding:12px 16px;word-break:break-word;font-size:14.5px;line-height:1.65}
.bubble.user{border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,#6d5dd3,#8b5cf6);color:#fff;box-shadow:0 2px 12px rgba(109,93,211,.25);white-space:pre-wrap}
.bubble.assistant{border-radius:18px 18px 18px 4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.04)}
.bubble.assistant p{margin:3px 0}
.bubble.assistant h2{margin:16px 0 6px;font-size:18px;font-weight:700}
.bubble.assistant h3{margin:14px 0 4px;font-size:16px;font-weight:700}
.bubble.assistant h4{margin:12px 0 4px;font-size:15px;font-weight:700}
.bubble.assistant pre{background:#1a1a2e;color:#e0def4;padding:14px 16px;border-radius:10px;overflow-x:auto;font-size:13px;font-family:'JetBrains Mono',monospace;margin:8px 0;line-height:1.5;border:1px solid rgba(255,255,255,.06);white-space:pre-wrap;word-break:break-all}
.bubble.assistant code.inline{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:.9em;font-family:'JetBrains Mono',monospace}
.bubble.assistant .list-item{padding-left:16px;position:relative;margin:2px 0}
.bubble.assistant .list-dot{position:absolute;left:4px}
.bubble.assistant .num-item{padding-left:20px;position:relative;margin:2px 0}
.bubble.assistant .num-label{position:absolute;left:2px;font-weight:600}
.msg-actions{display:flex;gap:6px;margin-top:3px}
.action-btn{background:none;border:none;cursor:pointer;opacity:.35;color:inherit;padding:3px 6px;display:flex;align-items:center;gap:3px;font-size:11px;font-family:inherit;border-radius:6px}
.action-btn:active{opacity:1;background:rgba(255,255,255,.08)}
.typing-dots{display:flex;gap:5px;align-items:center;padding:14px 20px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:pulse 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
.error-msg{margin:8px 0;padding:12px 16px;border-radius:14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:13px;line-height:1.5;word-break:break-word}
.input-area{padding:12px 14px;padding-bottom:max(16px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.06);background:rgba(15,15,26,1);flex-shrink:0}
.input-wrap{display:flex;align-items:flex-end;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:6px 8px 6px 16px;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(124,111,234,.4)}
.input-wrap textarea{flex:1;border:none;outline:none;background:transparent;color:#e8e6f0;font-size:15px;resize:none;max-height:150px;line-height:1.5;padding:8px 0;font-family:'Noto Sans TC',system-ui,sans-serif}
.input-wrap textarea::placeholder{color:rgba(255,255,255,.25)}
.send-btn{width:40px;height:40px;border-radius:14px;border:none;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;cursor:pointer}
.send-btn.active{background:linear-gradient(135deg,#7c6fea,#a78bfa);color:#fff}
.send-btn.inactive{background:rgba(255,255,255,.06);color:rgba(255,255,255,.2);cursor:default}
.edit-bar{padding:8px 14px;background:rgba(124,111,234,.15);border-top:1px solid rgba(124,111,234,.2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:13px;color:#c4b5fd}
.edit-bar.hidden{display:none}
.edit-bar button{background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;padding:4px 10px;border-radius:8px}
.edit-cancel{color:#e8e6f0;opacity:.6}
.edit-cancel:active{opacity:1}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.overlay.hidden{display:none}
.settings-panel{background:#1a1a2e;border-radius:20px 20px 0 0;padding:24px 22px;padding-bottom:max(34px,env(safe-area-inset-bottom));width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.5);animation:slideUp .3s ease}
.settings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.settings-header h2{font-size:18px;font-weight:700}
.close-btn{background:none;border:none;color:#e8e6f0;cursor:pointer;padding:4px}
.field-label{font-size:13px;font-weight:500;opacity:.7;display:block;margin-bottom:6px}
.field-label .hint{opacity:.5;font-weight:400}
.text-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e8e6f0;font-size:14px;outline:none;transition:border-color .2s}
.text-input:focus{border-color:rgba(124,111,234,.5)}
.text-input.mono{font-family:'JetBrains Mono',monospace}
.text-input.area{resize:vertical;font-family:'Noto Sans TC',system-ui,sans-serif;line-height:1.6}
.model-btns{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.model-btn{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.model-btn.on{border:1px solid rgba(124,111,234,.5);background:rgba(124,111,234,.2);color:#c4b5fd}
.model-btn.off{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e8e6f0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin:14px 0 4px;padding:2px 0}
.toggle-label{font-size:13px;font-weight:500;opacity:.7}
.toggle-label small{display:block;font-weight:400;opacity:.6;font-size:11px;margin-top:2px}
.toggle{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:rgba(124,111,234,.6)}
.toggle .knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s}
.toggle.on .knob{transform:translateX(18px)}
.thinking-block{margin-bottom:8px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);overflow:hidden}
.thinking-header{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;opacity:.5;user-select:none}
.thinking-header:active{opacity:.8}
.thinking-header.expanded svg{transform:rotate(90deg)}
.thinking-content{padding:0 12px 10px;font-size:13px;line-height:1.6;opacity:.55;display:none}
.thinking-content.expanded{display:block}
.save-btn{width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,#7c6fea,#a78bfa);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(124,111,234,.3);font-family:inherit}
.save-btn:active{transform:scale(.97)}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(110,231,183,.15);border:1px solid rgba(110,231,183,.3);color:#6ee7b7;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:100;backdrop-filter:blur(10px);animation:fadeIn .2s ease}
.toast.hidden{display:none}
.sys-note{text-align:center;font-size:11px;opacity:.35;padding:8px 0}
.sr-item{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.04);margin-bottom:8px;cursor:pointer;border:1px solid rgba(255,255,255,.06)}
.sr-item:active{background:rgba(124,111,234,.15)}
.sr-title{font-size:12px;font-weight:600;color:#c4b5fd;margin-bottom:4px}
.sr-text{font-size:13px;line-height:1.5;opacity:.7}
.sr-text mark{background:rgba(124,111,234,.35);color:#e8e6f0;border-radius:2px;padding:0 2px}
.sr-role{font-size:10px;opacity:.4;margin-bottom:2px}
.sr-empty{text-align:center;opacity:.35;padding:30px 0;font-size:13px}
/* Attachment */
.attach-btn{background:none;border:none;cursor:pointer;color:#e8e6f0;opacity:.4;padding:6px;display:flex;align-items:center;flex-shrink:0}
.attach-btn:active{opacity:.8}
.attach-preview{padding:8px 14px 4px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.attach-preview.hidden{display:none}
.att-thumb{position:relative;width:60px;height:60px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.att-thumb img{width:100%;height:100%;object-fit:cover}
.att-thumb .att-file{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(124,111,234,.1);font-size:10px;text-align:center;padding:4px;color:#c4b5fd;word-break:break-all}
.att-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.msg-img{max-width:200px;border-radius:10px;margin:6px 0}
/* Usage stats */
.usage-bar{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;opacity:.5;line-height:1.6}
.usage-bar span{color:#c4b5fd;font-weight:600;opacity:1}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Chats</h3>
    <button class="sidebar-new" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New
    </button>
  </div>
  <div class="conv-list" id="convList"></div>
  <div class="usage-bar" id="usageBar">
    Tokens: <span id="usageTokens">0</span><br>
    Cache hits: <span id="usageCache">0</span><br>
    Est. cost: <span id="usageCost">$0.000</span>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <button class="menu-btn" id="menuBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo">C</div>
      <div>
        <div class="header-title">Claude Chat</div>
        <div class="header-sub"><span id="modelLabel"></span><span class="online" id="statusDot" style="display:none">● Connected</span></div>
      </div>
    </div>
    <div class="header-btns">
      <button class="icon-btn" id="searchBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div style="font-size:40px">💬</div>
      <div style="font-size:15px;font-weight:500" id="emptyText">Send a message to start</div>
    </div>
  </div>
  <div class="edit-bar hidden" id="editBar">
    <span>✏️ Editing...</span>
    <button class="edit-cancel" id="editCancelBtn">Cancel</button>
  </div>
  <div class="attach-preview hidden" id="attachPreview"></div>
  <div class="input-area">
    <div class="input-wrap">
      <button class="attach-btn" id="attachBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <textarea id="msgInput" rows="1" placeholder="Set API key first..." disabled></textarea>
      <button class="send-btn inactive" id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
    <input type="file" id="fileInput" accept="image/*,.pdf" multiple style="display:none">
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="close-btn" id="closeSettingsBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <label class="field-label">API Key</label>
    <input type="password" id="apiKeyInput" class="text-input mono" placeholder="sk-ant-api03-..." style="margin-bottom:18px">
    <label class="field-label">Model</label>
    <div class="model-btns" id="modelBtns"></div>
    <label class="field-label">System Prompt <span class="hint">(optional)</span></label>
    <textarea id="sysPromptInput" class="text-input area" rows="4" placeholder="Set the AI personality, role, or instructions..."></textarea>
    <label class="field-label" style="margin-top:16px">Memory <span class="hint">(persistent across all chats)</span></label>
    <textarea id="memoryInput" class="text-input area" rows="3" placeholder="Info to always remember: name, preferences, facts..."></textarea>
    <div class="toggle-row">
      <div class="toggle-label">Extended Thinking<small>Shows reasoning process (token cost higher)</small></div>
      <button class="toggle" id="thinkingToggle"><div class="knob"></div></button>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">Auto Compress<small>Summarize old messages to save tokens</small></div>
      <button class="toggle on" id="compressToggle"><div class="knob"></div></button>
    </div>
    <button class="save-btn" id="saveBtn">Save</button>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="save-btn" id="exportBtn" style="background:rgba(255,255,255,.08);box-shadow:none;font-size:13px;padding:11px">Export Data</button>
      <button class="save-btn" id="importBtn" style="background:rgba(255,255,255,.08);box-shadow:none;font-size:13px;padding:11px">Import Data</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</div>
<div class="toast hidden" id="toast">Saved</div>

<div class="overlay hidden" id="searchOverlay">
  <div class="settings-panel" style="max-height:90vh">
    <div class="settings-header">
      <h2>Search All Chats</h2>
      <button class="close-btn" id="closeSearchBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input type="text" id="searchInput" class="text-input" placeholder="Search messages..." autofocus>
    <div id="searchResults" style="margin-top:14px;max-height:60vh;overflow-y:auto"></div>
  </div>
</div>

<script>
(function(){
"use strict";

var MODELS=[
  {id:"claude-sonnet-4-6",label:"Sonnet 4.6"},
  {id:"claude-sonnet-4-5",label:"Sonnet 4.5"},
  {id:"claude-opus-4-7",label:"Opus 4.7"},
  {id:"claude-opus-4-6",label:"Opus 4.6"},
  {id:"claude-haiku-4-5-20251001",label:"Haiku 4.5"}
];
var DM="claude-sonnet-4-6";

function ls(k,v){if(arguments.length===1){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function lr(k,v){if(arguments.length===1)return localStorage.getItem(k)||"";localStorage.setItem(k,v);}

var apiKey=lr("ck_apiKey");
var model=lr("ck_model")||DM;
if(!MODELS.some(function(m){return m.id===model}))model=DM;
var sysPrompt=lr("ck_sysPrompt");
var memory=lr("ck_memory");
var thinkOn=lr("ck_thinking")==="1";
var compressOn=lr("ck_compress")!=="0";
var loading=false,editIdx=-1;
var attachments=[]; // [{name,type,data,mediaType}]
var usage=ls("ck_usage")||{input:0,output:0,cost:0};

var convIdx=ls("ck_convIdx")||[];
var curConv=lr("ck_curConv");
var msgs=[];

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function saveCIdx(){ls("ck_convIdx",convIdx)}
function saveMsgs(id,m){ls("ck_m_"+id,m)}
function loadMsgs(id){return ls("ck_m_"+id)||[]}
function delMsgs(id){try{localStorage.removeItem("ck_m_"+id);localStorage.removeItem("ck_s_"+id)}catch(e){}}

var $=document.getElementById.bind(document);

function newConv(){
  if(curConv)saveMsgs(curConv,msgs);
  var id=gid();
  convIdx.unshift({id:id,title:"New chat",updatedAt:Date.now()});
  saveCIdx();curConv=id;lr("ck_curConv",id);
  msgs=[];editIdx=-1;$("editBar").classList.add("hidden");
  renderConvs();renderMsgs();updateUI();closeSB();
}
function switchConv(id){
  if(id===curConv){closeSB();return}
  if(curConv)saveMsgs(curConv,msgs);
  curConv=id;lr("ck_curConv",id);msgs=loadMsgs(id);
  editIdx=-1;$("editBar").classList.add("hidden");
  renderMsgs();updateUI();closeSB();
}
function delConv(id,ev){
  ev.stopPropagation();
  convIdx=convIdx.filter(function(c){return c.id!==id});
  saveCIdx();delMsgs(id);
  if(id===curConv){if(convIdx.length>0)switchConv(convIdx[0].id);else newConv()}
  renderConvs();
}
function updTitle(id,first){
  var c=convIdx.find(function(x){return x.id===id});
  if(!c)return;
  if(c.title==="New chat")c.title=first.slice(0,30)+(first.length>30?"...":"");
  c.updatedAt=Date.now();saveCIdx();renderConvs();
}
function renderConvs(){
  var el=$("convList");if(!el)return;
  el.innerHTML="";
  convIdx.forEach(function(c){
    var div=document.createElement("div");
    div.className="conv-item"+(c.id===curConv?" active":"");
    var d=new Date(c.updatedAt);
    var ts=(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
    div.innerHTML='<span class="conv-title">'+esc(c.title)+'</span><span class="conv-time">'+ts+'</span>';
    var db=document.createElement("button");db.className="conv-del";db.textContent="\u00d7";
    db.addEventListener("click",function(ev){delConv(c.id,ev)});
    div.appendChild(db);
    div.addEventListener("click",function(){switchConv(c.id)});
    el.appendChild(div);
  });
}

function toggleSB(){var s=$("sidebar"),o=$("sidebarOverlay");var open=!s.classList.contains("open");s.classList.toggle("open",open);o.classList.toggle("open",open)}
function closeSB(){$("sidebar").classList.remove("open");$("sidebarOverlay").classList.remove("open")}

function init(){
  $("apiKeyInput").value=apiKey;
  $("sysPromptInput").value=sysPrompt;
  $("memoryInput").value=memory;
  updToggles();renderModels();
  if(convIdx.length===0){
    var old=ls("ck_messages");
    var id=gid();var cv={id:id,title:"New chat",updatedAt:Date.now()};
    if(old&&old.length>0){cv.title=old[0].content.slice(0,30);saveMsgs(id,old)}
    convIdx=[cv];saveCIdx();curConv=id;lr("ck_curConv",id);
    try{localStorage.removeItem("ck_messages")}catch(e){}
  }
  if(!curConv||!convIdx.some(function(c){return c.id===curConv})){curConv=convIdx[0].id;lr("ck_curConv",curConv)}
  msgs=loadMsgs(curConv);
  renderConvs();renderMsgs();updateUI();
  if(!apiKey)toggleSettings();

  // Event listeners
  $("menuBtn").addEventListener("click",toggleSB);
  $("sidebarOverlay").addEventListener("click",closeSB);
  $("newChatBtn").addEventListener("click",newConv);
  $("settingsBtn").addEventListener("click",toggleSettings);
  $("closeSettingsBtn").addEventListener("click",toggleSettings);
  $("overlay").addEventListener("click",function(e){if(e.target===this)toggleSettings()});
  $("searchBtn").addEventListener("click",toggleSearch);
  $("closeSearchBtn").addEventListener("click",toggleSearch);
  $("searchOverlay").addEventListener("click",function(e){if(e.target===this)toggleSearch()});
  $("searchInput").addEventListener("input",debounce(doSearch,300));
  $("thinkingToggle").addEventListener("click",function(){thinkOn=!thinkOn;updToggles()});
  $("compressToggle").addEventListener("click",function(){compressOn=!compressOn;updToggles()});
  $("saveBtn").addEventListener("click",saveSets);
  $("exportBtn").addEventListener("click",exportData);
  $("importBtn").addEventListener("click",function(){$("importFile").click()});
  $("importFile").addEventListener("change",importData);
  $("sendBtn").addEventListener("click",send);
  $("editCancelBtn").addEventListener("click",cancelEdit);
  $("msgInput").addEventListener("input",function(){autoR(this);updSendBtn()});
  $("attachBtn").addEventListener("click",function(){$("fileInput").click()});
  $("fileInput").addEventListener("change",handleFiles);
  updUsage();
}

function renderModels(){
  var el=$("modelBtns");el.innerHTML="";
  MODELS.forEach(function(m){
    var b=document.createElement("button");
    b.className="model-btn "+(m.id===model?"on":"off");
    b.textContent=m.label;
    b.addEventListener("click",function(){model=m.id;renderModels()});
    el.appendChild(b);
  });
}
function updToggles(){
  $("thinkingToggle").classList.toggle("on",thinkOn);
  $("compressToggle").classList.toggle("on",compressOn);
}
function updateUI(){
  var hk=apiKey.trim().length>0;
  var ml=MODELS.find(function(m){return m.id===model});
  $("modelLabel").textContent=ml?ml.label:"";
  $("statusDot").style.display=hk?"inline":"none";
  var inp=$("msgInput");inp.disabled=!hk;
  inp.placeholder=hk?"Type a message...":"Set API key first...";
  var em=$("emptyState");
  if(em){if(msgs.length===0&&!loading){em.style.display="flex";$("emptyText").textContent=hk?"Send a message to start":"Set your API key in Settings"}else em.style.display="none"}
  updSendBtn();
}
function updSendBtn(){
  var b=$("sendBtn"),v=$("msgInput").value.trim();
  b.className="send-btn "+((v||attachments.length>0)&&apiKey.trim()&&!loading?"active":"inactive");
}
function autoR(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,150)+"px"}
function toggleSettings(){
  var ov=$("overlay"),b=$("settingsBtn");
  var opening=ov.classList.contains("hidden");
  ov.classList.toggle("hidden");b.classList.toggle("active",opening);
}
function saveSets(){
  apiKey=$("apiKeyInput").value;sysPrompt=$("sysPromptInput").value;memory=$("memoryInput").value;
  lr("ck_apiKey",apiKey);lr("ck_model",model);lr("ck_sysPrompt",sysPrompt);lr("ck_memory",memory);
  lr("ck_thinking",thinkOn?"1":"0");lr("ck_compress",compressOn?"1":"0");
  toggleSettings();updateUI();
  $("toast").classList.remove("hidden");setTimeout(function(){$("toast").classList.add("hidden")},2000);
}

function exportData(){
  var data={};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k.startsWith("ck_"))data[k]=localStorage.getItem(k);
  }
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="claude-chat-backup.json";
  a.click();URL.revokeObjectURL(a.href);
  $("toast").textContent="\u2713 Exported";$("toast").classList.remove("hidden");
  setTimeout(function(){$("toast").textContent="Saved";$("toast").classList.add("hidden")},2000);
}

function importData(ev){
  var file=ev.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      var count=0;
      for(var k in data){if(k.startsWith("ck_")){localStorage.setItem(k,data[k]);count++}}
      // Reload state from localStorage
      apiKey=lr("ck_apiKey");model=lr("ck_model")||DM;sysPrompt=lr("ck_sysPrompt");memory=lr("ck_memory");
      thinkOn=lr("ck_thinking")==="1";compressOn=lr("ck_compress")!=="0";
      convIdx=ls("ck_convIdx")||[];curConv=lr("ck_curConv");
      if(!curConv||!convIdx.some(function(c){return c.id===curConv})){if(convIdx.length>0)curConv=convIdx[0].id}
      msgs=loadMsgs(curConv);
      $("apiKeyInput").value=apiKey;$("sysPromptInput").value=sysPrompt;$("memoryInput").value=memory;
      updToggles();renderModels();renderConvs();renderMsgs();updateUI();
      $("toast").textContent="\u2713 Imported "+count+" items";$("toast").classList.remove("hidden");
      setTimeout(function(){$("toast").textContent="Saved";$("toast").classList.add("hidden")},2500);
    }catch(err){
      alert("Import failed: "+err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value="";
}

function toggleSearch(){
  var ov=$("searchOverlay");
  var opening=ov.classList.contains("hidden");
  ov.classList.toggle("hidden");
  if(opening){$("searchInput").value="";$("searchResults").innerHTML="";setTimeout(function(){$("searchInput").focus()},100)}
}

function debounce(fn,ms){var t;return function(){clearTimeout(t);var a=arguments,self=this;t=setTimeout(function(){fn.apply(self,a)},ms)}}

function doSearch(){
  var q=$("searchInput").value.trim().toLowerCase();
  var res=$("searchResults");
  if(!q){res.innerHTML="";return}
  var results=[];
  convIdx.forEach(function(c){
    var cmsg=loadMsgs(c.id);
    cmsg.forEach(function(m,i){
      var text=m.content.toLowerCase();
      if(text.indexOf(q)!==-1){
        results.push({convId:c.id,convTitle:c.title,role:m.role,content:m.content,idx:i});
      }
    });
  });
  if(results.length===0){res.innerHTML='<div class="sr-empty">No results found</div>';return}
  res.innerHTML="";
  results.slice(0,30).forEach(function(r){
    var div=document.createElement("div");div.className="sr-item";
    var snippet=r.content;
    var li=snippet.toLowerCase().indexOf(q);
    var start=Math.max(0,li-30);
    var end=Math.min(snippet.length,li+q.length+50);
    var s=(start>0?"...":"")+snippet.slice(start,end)+(end<snippet.length?"...":"");
    // Highlight
    var qs=esc(q);
    var se=esc(s);
    var highlighted=se.replace(new RegExp(qs.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi"),function(m){return"<mark>"+m+"</mark>"});
    div.innerHTML='<div class="sr-title">'+esc(r.convTitle)+'</div><div class="sr-role">'+(r.role==="user"?"You":"Claude")+'</div><div class="sr-text">'+highlighted+'</div>';
    div.addEventListener("click",function(){
      toggleSearch();
      if(r.convId!==curConv)switchConv(r.convId);
      // Scroll to message
      setTimeout(function(){
        var rows=document.querySelectorAll(".msg-row");
        if(rows[r.idx]){rows[r.idx].scrollIntoView({behavior:"smooth",block:"center"});rows[r.idx].style.outline="1px solid rgba(124,111,234,0.5)";rows[r.idx].style.borderRadius="14px";setTimeout(function(){rows[r.idx].style.outline="none"},2000)}
      },200);
    });
    res.appendChild(div);
  });
  if(results.length>30){
    var more=document.createElement("div");more.className="sr-empty";more.textContent="Showing 30 of "+results.length+" results";res.appendChild(more);
  }
}

// --- Cost per 1M tokens ---
var COSTS={
  "claude-sonnet-4-6":{i:3,o:15},"claude-sonnet-4-5":{i:3,o:15},
  "claude-opus-4-7":{i:15,o:75},"claude-opus-4-6":{i:15,o:75},
  "claude-haiku-4-5-20251001":{i:.8,o:4}
};
function trackUsage(data){
  if(!data||!data.usage)return;
  var u=data.usage;
  var c=COSTS[model]||{i:3,o:15};
  var inp=u.input_tokens||0;
  var out=u.output_tokens||0;
  var cacheWrite=u.cache_creation_input_tokens||0;
  var cacheRead=u.cache_read_input_tokens||0;
  usage.input+=inp+cacheWrite+cacheRead;
  usage.output+=out;
  // Cost: normal input=1x, cache write=1.25x, cache read=0.1x, output=1x
  usage.cost+=(inp*c.i + cacheWrite*c.i*1.25 + cacheRead*c.i*0.1 + out*c.o)/1e6;
  usage.cacheRead=(usage.cacheRead||0)+cacheRead;
  usage.cacheWrite=(usage.cacheWrite||0)+cacheWrite;
  ls("ck_usage",usage);updUsage();
}
function updUsage(){
  var t=$("usageTokens"),c=$("usageCost"),ch=$("usageCache");
  if(t)t.textContent=(usage.input+usage.output).toLocaleString();
  if(c)c.textContent="$"+usage.cost.toFixed(4);
  if(ch)ch.textContent=(usage.cacheRead||0).toLocaleString()+" tokens saved";
}

// --- Attachments ---
function handleFiles(ev){
  var files=ev.target.files;if(!files||!files.length)return;
  Array.from(files).forEach(function(file){
    if(attachments.length>=4)return; // max 4
    var reader=new FileReader();
    reader.onload=function(e){
      var base64=e.target.result.split(",")[1];
      var mediaType=file.type||"application/octet-stream";
      var isImg=/^image\//.test(mediaType);
      attachments.push({name:file.name,data:base64,mediaType:mediaType,isImg:isImg,preview:isImg?e.target.result:null});
      renderAttachPrev();
    };
    reader.readAsDataURL(file);
  });
  ev.target.value="";
}
function renderAttachPrev(){
  var el=$("attachPreview");
  if(attachments.length===0){el.classList.add("hidden");el.innerHTML="";updSendBtn();return}
  el.classList.remove("hidden");el.innerHTML="";
  attachments.forEach(function(a,i){
    var div=document.createElement("div");div.className="att-thumb";
    if(a.isImg){div.innerHTML='<img src="'+a.preview+'">';}
    else{div.innerHTML='<div class="att-file">'+esc(a.name)+'</div>';}
    var rm=document.createElement("button");rm.className="att-remove";rm.textContent="\u00d7";
    (function(idx){rm.addEventListener("click",function(){attachments.splice(idx,1);renderAttachPrev()})})(i);
    div.appendChild(rm);el.appendChild(div);
  });
  updSendBtn();
}
function buildMsgContent(text){
  if(attachments.length===0)return text;
  var parts=[];
  attachments.forEach(function(a){
    if(a.isImg){
      parts.push({type:"image",source:{type:"base64",media_type:a.mediaType,data:a.data}});
    }else if(a.mediaType==="application/pdf"){
      parts.push({type:"document",source:{type:"base64",media_type:a.mediaType,data:a.data}});
    }
  });
  if(text)parts.push({type:"text",text:text});
  return parts;
}
function buildApiMsgs(){
  var apiMsgs=msgs.map(function(m){
    var c=m.content;
    if(Array.isArray(m.attachments)&&m.attachments.length>0){
      var parts=[];
      m.attachments.forEach(function(a){
        if(a.isImg)parts.push({type:"image",source:{type:"base64",media_type:a.mediaType,data:a.data}});
        else if(a.mediaType==="application/pdf")parts.push({type:"document",source:{type:"base64",media_type:a.mediaType,data:a.data}});
      });
      parts.push({type:"text",text:c});
      return{role:m.role,content:parts};
    }
    return{role:m.role,content:c};
  });
  // Add cache_control to second-to-last message
  // This caches system + all history except the very last exchange
  if(apiMsgs.length>=2){
    var ci=apiMsgs.length-2;
    var target=apiMsgs[ci];
    if(typeof target.content==="string"){
      target.content=[{type:"text",text:target.content,cache_control:{type:"ephemeral"}}];
    }else if(Array.isArray(target.content)){
      var last=target.content[target.content.length-1];
      last.cache_control={type:"ephemeral"};
    }
  }
  return apiMsgs;
}

function scrollB(){var a=$("chatArea");requestAnimationFrame(function(){a.scrollTop=a.scrollHeight})}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function renderMd(t){
  var lines=t.split("\n"),h="",ic=false,cl=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.startsWith("```")){if(ic){h+="<pre>"+esc(cl.join("\n"))+"</pre>";cl=[];ic=false}else ic=true;continue}
    if(ic){cl.push(l);continue}
    if(l.startsWith("### "))h+="<h4>"+fI(l.slice(4))+"</h4>";
    else if(l.startsWith("## "))h+="<h3>"+fI(l.slice(3))+"</h3>";
    else if(l.startsWith("# "))h+="<h2>"+fI(l.slice(2))+"</h2>";
    else if(/^[-*]\s/.test(l))h+='<div class="list-item"><span class="list-dot">\u2022</span>'+fI(l.slice(2))+"</div>";
    else if(/^\d+\.\s/.test(l)){var m=l.match(/^(\d+)\.\s(.*)/);h+='<div class="num-item"><span class="num-label">'+m[1]+'.</span>'+fI(m[2])+"</div>"}
    else if(l.trim()==="")h+='<div style="height:8px"></div>';
    else h+="<p>"+fI(l)+"</p>";
  }
  if(ic)h+="<pre>"+esc(cl.join("\n"))+"</pre>";
  return h;
}
function fI(t){t=esc(t);t=t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");t=t.replace(/`(.+?)`/g,'<code class="inline">$1</code>');t=t.replace(/_(.+?)_/g,"<em>$1</em>");return t}

function editMsg(idx){if(loading)return;editIdx=idx;var inp=$("msgInput");inp.value=msgs[idx].content;autoR(inp);inp.focus();$("editBar").classList.remove("hidden");updSendBtn()}
function cancelEdit(){editIdx=-1;$("msgInput").value="";$("msgInput").style.height="auto";$("editBar").classList.add("hidden");updSendBtn()}

function renderMsgs(){
  var area=$("chatArea");
  area.innerHTML='<div class="empty-state" id="emptyState" style="display:none"><div style="font-size:40px">\uD83D\uDCAC</div><div style="font-size:15px;font-weight:500" id="emptyText">Send a message to start</div></div>';
  if(msgs.length===0){$("emptyState").style.display="flex";return}
  msgs.forEach(function(m,i){addBub(m.role,m.content,true,i,m.thinking||"")});
  scrollB();
}

function toggleThink(el){
  var content=el.nextElementSibling;
  var open=!content.classList.contains("expanded");
  content.classList.toggle("expanded",open);
  el.classList.toggle("expanded",open);
}

function addBub(role,content,noA,idx,think){
  var em=$("emptyState");if(em)em.style.display="none";
  var area=$("chatArea");
  var row=document.createElement("div");
  row.className="msg-row "+role+(noA?" no-anim":"");
  var bub=document.createElement("div");
  bub.className="bubble "+role;

  if(role==="user"){
    // Show attachments if any
    var msg=msgs[idx];
    if(msg&&msg.attachments&&msg.attachments.length>0){
      msg.attachments.forEach(function(a){
        if(a.isImg&&a.preview){
          var img=document.createElement("img");img.src=a.preview;img.className="msg-img";bub.appendChild(img);
        }else{
          var fd=document.createElement("div");fd.style.cssText="font-size:11px;opacity:.7;margin:4px 0";fd.textContent="\uD83D\uDCCE "+a.name;bub.appendChild(fd);
        }
      });
    }
    var t=document.createElement("span");t.textContent=content;bub.appendChild(t);
  }else{
    var html="";
    if(think){
      html+='<div class="thinking-block"><div class="thinking-header"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>Thinking</div><div class="thinking-content">'+renderMd(think)+'</div></div>';
    }
    html+=renderMd(content);
    bub.innerHTML=html;
    // Attach thinking toggle listener
    var th=bub.querySelector(".thinking-header");
    if(th)th.addEventListener("click",function(){toggleThink(this)});
  }
  row.appendChild(bub);

  var acts=document.createElement("div");acts.className="msg-actions";
  if(role==="user"&&typeof idx==="number"){
    var eb=document.createElement("button");eb.className="action-btn";
    eb.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit';
    (function(i){eb.addEventListener("click",function(){editMsg(i)})})(idx);
    acts.appendChild(eb);
  }
  if(role==="assistant"){
    var cb=document.createElement("button");cb.className="action-btn";
    cb.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
    (function(c,b){b.addEventListener("click",function(){navigator.clipboard.writeText(c);b.textContent="\u2713 Copied";setTimeout(function(){b.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy'},1500)})})(content,cb);
    acts.appendChild(cb);
  }
  row.appendChild(acts);area.appendChild(row);scrollB();
}

function showDots(){var em=$("emptyState");if(em)em.style.display="none";var area=$("chatArea");var r=document.createElement("div");r.className="msg-row assistant";r.id="typingRow";r.innerHTML='<div class="bubble assistant"><div class="typing-dots"><span></span><span></span><span></span></div></div>';area.appendChild(r);scrollB()}
function hideDots(){var el=$("typingRow");if(el)el.remove()}

function getSummary(){return lr("ck_s_"+curConv)}
function setSummary(s){lr("ck_s_"+curConv,s)}

function buildSys(){
  var blocks=[];
  // Stable part — cached (prompt + memory + summary, rarely changes)
  var stable=[];
  if(sysPrompt.trim())stable.push(sysPrompt.trim());
  if(memory.trim())stable.push("[Memory]\n"+memory.trim());
  var s=getSummary();
  if(s)stable.push("[Previous conversation summary]\n"+s);
  if(stable.length>0){
    blocks.push({type:"text",text:stable.join("\n\n"),cache_control:{type:"ephemeral"}});
  }
  // Dynamic part — NOT cached (time changes every minute)
  var now=new Date();
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var timeStr=now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "+days[now.getDay()]+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  blocks.push({type:"text",text:"[Current time]\n"+timeStr});
  return blocks.length>0?blocks:null;
}

function charCount(ms){var t=0;ms.forEach(function(m){t+=m.content.length;if(m.thinking)t+=m.thinking.length});return t}

async function compress(){
  var KEEP=8;
  if(msgs.length<=KEEP+2)return;
  var old=msgs.slice(0,msgs.length-KEEP);
  var keep=msgs.slice(msgs.length-KEEP);
  var existing=getSummary();
  var prompt="";
  if(existing)prompt+="[Existing summary]\n"+existing+"\n\n";
  prompt+="[Messages to summarize]\n";
  old.forEach(function(m){prompt+=(m.role==="user"?"User: ":"Assistant: ")+m.content+"\n\n"});
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1500,system:"Summarize this conversation concisely but keep all key info, names, emotions, decisions. Use the same language. Output ONLY the summary.",messages:[{role:"user",content:prompt}]})
    });
    if(!res.ok)return;
    var data=await res.json();
    trackUsage(data);
    var sum=(data.content||[]).filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("\n");
    if(sum){setSummary(sum);msgs=keep;saveMsgs(curConv,msgs);
      var note=document.createElement("div");note.className="sys-note";note.textContent="\uD83D\uDCAD Old messages compressed to save tokens";$("chatArea").appendChild(note);scrollB()}
  }catch(e){}
}

async function send(){
  var inp=$("msgInput"),text=inp.value.trim();
  if((!text&&attachments.length===0)||loading||!apiKey.trim())return;
  if(editIdx>=0){msgs=msgs.slice(0,editIdx);editIdx=-1;$("editBar").classList.add("hidden")}
  var msgObj={role:"user",content:text||"(image)"};
  if(attachments.length>0)msgObj.attachments=JSON.parse(JSON.stringify(attachments));
  msgs.push(msgObj);
  updTitle(curConv,msgs[0].content);
  saveMsgs(curConv,msgs);renderMsgs();
  attachments=[];renderAttachPrev();
  inp.value="";inp.style.height="auto";
  loading=true;updSendBtn();showDots();
  try{
    var sys=buildSys();
    var body={model:model,max_tokens:thinkOn?16000:8192,messages:buildApiMsgs()};
    if(sys)body.system=sys;
    if(thinkOn)body.thinking={type:"enabled",budget_tokens:10000};
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
    if(!res.ok){var ed=await res.json().catch(function(){return null});throw new Error(ed&&ed.error?ed.error.message||ed.error.type:"API Error "+res.status)}
    var data=await res.json();
    trackUsage(data);
    var thinkT="",assT="";
    (data.content||[]).forEach(function(b){if(b.type==="thinking")thinkT+=b.thinking;else if(b.type==="text")assT+=b.text});
    if(!assT)assT="(No response)";
    var obj={role:"assistant",content:assT};if(thinkT)obj.thinking=thinkT;
    msgs.push(obj);saveMsgs(curConv,msgs);
    hideDots();addBub("assistant",assT,false,msgs.length-1,thinkT);
    if(compressOn&&charCount(msgs)>15000)await compress();
  }catch(err){
    hideDots();var area=$("chatArea");var ed2=document.createElement("div");ed2.className="error-msg";ed2.textContent="\u26A0 "+err.message;area.appendChild(ed2);scrollB();
  }finally{loading=false;updSendBtn();inp.focus()}
}

init();
})();
</script>
